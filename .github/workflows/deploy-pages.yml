# 构建 apps/web 和 apps/h5 并部署到 GitHub Pages
#
# 使用方式：
# 1. 将代码推送到 GitHub 仓库
# 2. 仓库 Settings → Pages → Source 选择 "GitHub Actions"
# 3. 推送 main 分支即自动构建部署
#
# 部署后访问地址：
#   PC 官网: https://zbody.github.io/lankit/
#   H5 移动端: https://zbody.github.io/lankit/h5/

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/web/**'
      - 'apps/h5/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (static export)
        run: pnpm --filter @platform/web build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name && format('/{0}', github.event.repository.name) || '' }}

      - name: Build h5 (static export)
        run: pnpm --filter @platform/h5 build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name && format('/{0}/h5', github.event.repository.name) || '/h5' }}

      - name: Merge h5 output into web output
        run: |
          mkdir -p apps/web/out/h5
          cp -r apps/h5/out/* apps/web/out/h5/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
