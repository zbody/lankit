# 构建 apps/web 并部署到 GitHub Pages
#
# 使用方式：
# 1. 将代码推送到 GitHub 仓库
# 2. 仓库 Settings → Pages → Source 选择 "GitHub Actions"
# 3. 推送 main 分支即自动构建部署
#
# 如果使用了自定义域名，在仓库 Settings → Pages 中配置即可

name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (static export)
        run: pnpm --filter @platform/web build
        env:
          # GitHub Pages 部署在子路径下，自动检测仓库名作为 basePath
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name && format('/{0}', github.event.repository.name) || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
